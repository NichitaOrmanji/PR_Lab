name: CI/CD Pipeline

on:
  push:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        run: docker build -t igorbogaci/backend:latest ./backend

      - name: Build frontend image
        run: docker build -t igorbogaci/frontend:latest ./frontend

      - name: Create network
        run: docker network create lab3-net

      - name: Start database
        run: |
          docker run -d \
            --name db \
            --network lab3-net \
            -e POSTGRES_DB=tododb \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -v ${{ github.workspace }}/db/init.sql:/docker-entrypoint-initdb.d/init.sql \
            -p 5432:5432 \
            postgres:15-alpine
          sleep 8

      - name: Start backend
        run: |
          docker run -d \
            --name backend \
            --network lab3-net \
            -e DB_HOST=db \
            -e DB_NAME=tododb \
            -e DB_USER=postgres \
            -e DB_PASS=postgres \
            -p 5000:5000 \
            igorbogaci/backend:latest
          sleep 5

      - name: Start frontend
        run: |
          docker run -d \
            --name frontend \
            --network lab3-net \
            -p 8080:80 \
            igorbogaci/frontend:latest

      - name: Test backend API
        run: |
          curl -f http://localhost:5000/tasks
          echo "GET /tasks - OK"

      - name: Test create task
        run: |
          curl -f -X POST http://localhost:5000/tasks \
            -H "Content-Type: application/json" \
            -d '{"title": "CI Test Task", "description": "Created by GitHub Actions"}'
          echo "POST /tasks - OK"

      - name: Test frontend
        run: |
          curl -f http://localhost:8080
          echo "Frontend - OK"

      - name: Stop and remove containers
        run: |
          docker rm -f db backend frontend
          docker network rm lab3-net

      - name: Push backend to Docker Hub
        run: docker push igorbogaci/backend:latest

      - name: Push frontend to Docker Hub
        run: docker push igorbogaci/frontend:latest